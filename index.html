<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#173d37" />
    <meta name="description" content="Ежедневный тренажёр английских времён с интервальными повторениями." />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <title>Tense Day — английские времена</title>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <button class="brand" type="button" data-action="home" aria-label="На главную">
          <span class="brand-mark">T</span>
          <span>Tense Day</span>
        </button>
        <button class="text-button" type="button" data-action="reset">Сбросить</button>
      </header>

      <section id="dashboard" class="page" aria-live="polite"></section>
      <section id="lesson" class="page hidden" aria-live="polite"></section>
      <section id="guide" class="page hidden" aria-live="polite"></section>
      <section id="quiz" class="page hidden" aria-live="polite"></section>
    </main>

    <template id="toast-template">
      <div class="toast" role="status"></div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
